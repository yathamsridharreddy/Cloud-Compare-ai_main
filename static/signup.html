<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CloudCompare AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        /* Dynamic Space Background */
        body { font-family: 'Inter', sans-serif; background: #030014; color: #fff; height: 100vh; overflow: hidden; position: relative; }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse at 80% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
        }
        .stars { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1; }

        .nav-container { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.25rem 2rem; }
        .nav-inner { max-width: 80rem; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-circle { width: 34px; height: 34px; border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .logo-circle-inner { width: 12px; height: 12px; background: #fff; border-radius: 50%; }
        .logo-text { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        .nav-links { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.15); border-radius: 9999px; padding: 0.4rem 0.5rem; backdrop-filter: blur(12px); background: rgba(0,0,0,0.3); }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; padding: 0.45rem 0.9rem; border-radius: 9999px; transition: all 0.3s; white-space: nowrap; }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-links a.contact-link { display: flex; align-items: center; gap: 4px; }
        .nav-links a.contact-link .arrow-icon { transition: transform 0.3s; font-size: 0.7rem; }
        .nav-links a.contact-link:hover .arrow-icon { transform: translateX(3px); }
        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; }

        /* Hero behind the signup form */
        .hero-section { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        .hero-top { max-width: 80rem; margin: 0 auto; width: 100%; padding: 7rem 2rem 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; }
        .hero-top p { color: rgba(255,255,255,0.7); font-size: 0.875rem; max-width: 340px; line-height: 1.6; }
        .hero-top .right-text { text-align: right; }
        .hero-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .hero-subtitle { text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
        .hero-heading { line-height: 0.85; letter-spacing: -0.04em; margin-bottom: 2.5rem; }
        .hero-heading .line1 { display: block; font-size: clamp(3rem, 8vw, 8rem); font-weight: 500; color: #fff; }
        .hero-heading .line2 { display: block; font-size: clamp(3rem, 8vw, 8rem); font-weight: 500; }
        .shiny-text {
            background: linear-gradient(100deg, #00d2ff 0%, #00d2ff 40%, #ffffff 50%, #00d2ff 60%, #00d2ff 100%);
            background-size: 250% 100%; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shinyMove 3s linear infinite;
        }
        @keyframes shinyMove { 0% { background-position: 150% center; } 100% { background-position: -50% center; } }

        .cta-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.15);
            padding: 0.9rem 2rem; border-radius: 9999px; font-size: 0.95rem; font-weight: 500;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
        }
        .cta-btn:hover { background: #1a1a1a; border-color: rgba(255,255,255,0.3); }
        .cta-btn .btn-arrow { transition: transform 0.3s; }
        .cta-btn:hover .btn-arrow { transform: translateX(4px); }

        /* Auth Container */
        .auth-container {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            padding: 0 1rem;
        }

        .signup-card {
            background: rgba(13, 17, 30, 0.85); border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 24px; padding: 2.2rem 2.5rem; width: 100%; max-width: 440px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 30px rgba(138, 43, 226, 0.1); backdrop-filter: blur(30px);
            animation: cardIn 0.5s cubic-bezier(0.23,1,0.32,1) both; position: relative;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.92) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .signup-header { text-align: center; margin-bottom: 1.5rem; }
        .signup-header .header-icon { font-size: 2.5rem; color: #00d2ff; margin-bottom: 0.6rem; display: inline-block; }
        .signup-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
        .signup-header p { color: #94a3b8; font-size: 0.85rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #94a3b8; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .form-control {
            width: 100%; padding: 0.9rem 1.1rem; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;
            font-family: inherit; font-size: 0.95rem; transition: all 0.3s; box-sizing: border-box;
        }
        .form-control:focus { outline: none; border-color: #00d2ff; box-shadow: 0 0 20px rgba(0, 210, 255, 0.15); }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 3rem; }
        .toggle-password { position: absolute; right: 1rem; top: 1rem; background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 1rem; transition: color 0.3s; padding: 0; }
        .toggle-password:hover { color: #00d2ff; }

        .btn-submit {
            width: 100%; padding: 1rem; border: none; border-radius: 12px; font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: all 0.4s; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #00d2ff, #8a2be2); color: #fff; margin-top: 0.5rem;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(138, 43, 226, 0.35); }
        .btn-submit::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: 0.6s; }
        .btn-submit:hover::after { left: 100%; }

        .signup-footer { margin-top: 1.5rem; text-align: center; color: #64748b; font-size: 0.9rem; }
        .signup-footer a { color: #00d2ff; text-decoration: none; font-weight: 700; transition: color 0.3s; }
        .signup-footer a:hover { color: #fff; }

        .form-validation { font-size: 0.75rem; margin-top: 0.3rem; display: none; align-items: center; gap: 0.3rem; }
        .form-validation.error { color: #fca5a5; display: flex; }
        .form-validation.success { color: #86efac; display: flex; }

        .password-strength { margin-top: 0.5rem; }
        .strength-indicator { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 0.4rem; }
        .strength-bar { height: 100%; width: 0%; transition: all 0.4s; }
        .strength-bar.weak { background: #ef4444; width: 25%; }
        .strength-bar.fair { background: #fbbf24; width: 50%; }
        .strength-bar.good { background: #60a5fa; width: 75%; }
        .strength-bar.strong { background: #22c55e; width: 100%; }
        .strength-text { font-size: 0.75rem; color: #64748b; display: flex; align-items: center; gap: 0.4rem; }
        .strength-text i { font-size: 0.5rem; }

        .password-requirements { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 0.8rem; margin-top: 0.8rem; }
        .requirement { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; color: #475569; font-size: 0.72rem; transition: all 0.3s; }
        .requirement i { font-size: 0.5rem; }
        .requirement.met { color: #86efac; }
        .requirement.met i { color: #22c55e; }

        .alert { display: none; padding: 0.85rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.85rem; white-space: pre-wrap; }
        .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

        @media (max-width: 1023px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .hero-top { flex-direction: column; padding-top: 5.5rem; gap: 0.8rem; }
            .hero-top .right-text { text-align: left; }
        }
        @media (min-width: 768px) {
            .hero-subtitle { font-size: 0.85rem; }
            .hero-top p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <nav class="nav-container">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="logo-circle"><div class="logo-circle-inner"></div></div>
                <span class="logo-text">CloudCompare AI</span>
            </a>

        </div>
    </nav>

    <!-- Signup form wrapper -->
    <div class="auth-container">
        <div class="signup-card">

            <div class="signup-header">
                <div class="header-icon"><i class="fas fa-user-plus"></i></div>
                <h2>Create Account</h2>
                <p>Join CloudCompare AI today</p>
            </div>
            <div id="statusMsg" class="alert"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    <div class="form-validation" id="emailValidation"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-indicator"><div class="strength-bar" id="strengthBar"></div></div>
                        <div class="strength-text" id="strengthText"><i class="fas fa-circle"></i> <span id="strengthLabel">Enter a password</span></div>
                    </div>
                    <div class="password-requirements">
                        <div class="requirement" id="req-length"><i class="fas fa-circle"></i> At least 8 characters</div>
                        <div class="requirement" id="req-number"><i class="fas fa-circle"></i> At least one number</div>
                        <div class="requirement" id="req-symbol"><i class="fas fa-circle"></i> At least one symbol (!@#$%^&*)</div>
                        <div class="requirement" id="req-letter"><i class="fas fa-circle"></i> At least one letter</div>
                    </div>
                    <div class="form-validation" id="passwordValidation"></div>
                </div>
                <button type="submit" class="btn-submit" id="signupBtn">
                    <i class="fas fa-user-check"></i> Sign Up
                </button>
            </form>
            <div class="signup-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
        const symbolRegex = /[!@#$%^&*(),.?":{}|<>]/;

        document.getElementById('email').addEventListener('blur', () => { validateSignupEmail(); });
        function validateSignupEmail() {
            const el = document.getElementById('email'), v = document.getElementById('emailValidation'), email = el.value.trim();
            if (!email) { v.style.display = 'none'; return true; }
            if (!emailRegex.test(email)) { v.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format'; v.classList.remove('success'); v.classList.add('error'); v.style.display = 'block'; return false; }
            v.innerHTML = '<i class="fas fa-check-circle"></i> Valid email'; v.classList.remove('error'); v.classList.add('success'); v.style.display = 'block'; return true;
        }

        document.getElementById('password').addEventListener('input', () => { checkPasswordStrength(); });
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar'), strengthLabel = document.getElementById('strengthLabel'), pv = document.getElementById('passwordValidation');
            const hasLength = password.length >= 8, hasNumber = /\d/.test(password), hasSymbol = symbolRegex.test(password), hasLetter = /[a-zA-Z]/.test(password);
            updateReq('req-length', hasLength); updateReq('req-number', hasNumber); updateReq('req-symbol', hasSymbol); updateReq('req-letter', hasLetter);
            if (!password) { strengthBar.className = 'strength-bar'; strengthLabel.textContent = 'Enter a password'; pv.style.display = 'none'; return true; }
            let s = 0; if (hasLength) s++; if (hasNumber) s++; if (hasSymbol) s++; if (hasLetter) s++;
            strengthBar.className = 'strength-bar';
            if (s < 2) { strengthBar.classList.add('weak'); strengthLabel.textContent = 'Weak'; pv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Too weak'; pv.classList.remove('success'); pv.classList.add('error'); pv.style.display = 'block'; return false; }
            else if (s < 3) { strengthBar.classList.add('fair'); strengthLabel.textContent = 'Fair'; pv.innerHTML = '<i class="fas fa-info-circle"></i> Fair'; pv.classList.remove('success'); pv.classList.add('error'); pv.style.display = 'block'; return false; }
            else if (s < 4) { strengthBar.classList.add('good'); strengthLabel.textContent = 'Good'; pv.innerHTML = '<i class="fas fa-check-circle"></i> Good'; pv.classList.remove('error'); pv.classList.add('success'); pv.style.display = 'block'; return true; }
            else { strengthBar.classList.add('strong'); strengthLabel.textContent = 'Strong'; pv.innerHTML = '<i class="fas fa-check-circle"></i> Strong'; pv.classList.remove('error'); pv.classList.add('success'); pv.style.display = 'block'; return true; }
        }
        function updateReq(id, met) { const el = document.getElementById(id); met ? el.classList.add('met') : el.classList.remove('met'); }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn'), statusMsg = document.getElementById('statusMsg');
            if (!validateSignupEmail()) { statusMsg.textContent = 'Please enter a valid email'; statusMsg.classList.remove('alert-success'); statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block'; return; }
            if (!checkPasswordStrength()) { statusMsg.textContent = 'Password must be at least Good strength'; statusMsg.classList.remove('alert-success'); statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block'; return; }
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...'; btn.disabled = true; statusMsg.style.display = 'none'; statusMsg.className = 'alert';
            const name = document.getElementById('name').value.trim(), email = document.getElementById('email').value.trim(), password = document.getElementById('password').value;
            if (!name || name.length < 2) { statusMsg.textContent = 'Please enter a valid name'; statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block'; btn.innerHTML = '<i class="fas fa-user-check"></i> Sign Up'; btn.disabled = false; return; }
            try {
                const response = await fetch('/api/auth/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password }) });
                const text = await response.text(); let data; try { data = JSON.parse(text); } catch(e) { data = {}; }
                // ApiResponse format: { success, data: { token, user }, error }
                if (data.success && data.data && data.data.token) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('userName', data.data.user.name);
                    statusMsg.textContent = 'Account created! Redirecting...';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    const errMsg = data.error || (data.detail && (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail))) || 'Signup failed. Please try again.';
                    statusMsg.textContent = errMsg;
                    statusMsg.classList.add('alert-error');
                    statusMsg.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-user-check"></i> Sign Up';
                    btn.disabled = false;
                }
            } catch (err) { statusMsg.textContent = 'Unable to connect to the server.'; statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block'; btn.innerHTML = '<i class="fas fa-user-check"></i> Sign Up'; btn.disabled = false; }
        });
    </script>
</body>
</html>
