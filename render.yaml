services:
  - type: web
    name: cloud-compare-api
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build"
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GROK_API_KEYS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: cloud-compare-db
    databaseName: cloudcompare
    user: clouduser
    region: oregon
