<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudCompare AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        /* Dynamic Space Background */
        body { font-family: 'Inter', sans-serif; background: #030014; color: #fff; min-height: 100vh; overflow-x: hidden; position: relative; }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse at 80% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
        }
        .stars { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1; }

        .nav-container { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.25rem 2rem; }
        .nav-inner { max-width: 80rem; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-circle { width: 34px; height: 34px; border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .logo-circle-inner { width: 12px; height: 12px; background: #fff; border-radius: 50%; }
        .logo-text { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

        .nav-links { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.15); border-radius: 9999px; padding: 0.4rem 0.5rem; backdrop-filter: blur(12px); background: rgba(0,0,0,0.3); }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; padding: 0.45rem 0.9rem; border-radius: 9999px; transition: all 0.3s; white-space: nowrap; }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-links a.contact-link { display: flex; align-items: center; gap: 4px; }
        .nav-links a.contact-link .arrow-icon { transition: transform 0.3s; font-size: 0.7rem; }
        .nav-links a.contact-link:hover .arrow-icon { transform: translateX(3px); }

        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; }

        .hero-section { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        .hero-top { max-width: 80rem; margin: 0 auto; width: 100%; padding: 7rem 2rem 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; }
        .hero-top p { color: rgba(255,255,255,0.7); font-size: 0.875rem; max-width: 340px; line-height: 1.6; }
        .hero-top .right-text { text-align: right; }

        .hero-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .hero-subtitle { text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
        .hero-heading { line-height: 0.85; letter-spacing: -0.04em; margin-bottom: 2.5rem; }
        .hero-heading .line1 { display: block; font-size: clamp(3rem, 8vw, 8rem); font-weight: 500; color: #fff; }
        .hero-heading .line2 { display: block; font-size: clamp(3rem, 8vw, 8rem); font-weight: 500; }

        .shiny-text {
            background: linear-gradient(100deg, #00d2ff 0%, #00d2ff 40%, #ffffff 50%, #00d2ff 60%, #00d2ff 100%);
            background-size: 250% 100%; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shinyMove 3s linear infinite;
        }
        @keyframes shinyMove { 0% { background-position: 150% center; } 100% { background-position: -50% center; } }

        .cta-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.15);
            padding: 0.9rem 2rem; border-radius: 9999px; font-size: 0.95rem; font-weight: 500;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
        }
        .cta-btn:hover { background: #1a1a1a; border-color: rgba(255,255,255,0.3); }
        .cta-btn .btn-arrow { transition: transform 0.3s; }
        .cta-btn:hover .btn-arrow { transform: translateX(4px); }

        /* Auth Container */
        .auth-container {
            position: relative; z-index: 10; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 6rem 1rem 2rem;
        }

        .login-card {
            background: rgba(13, 17, 30, 0.85); border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 420px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 30px rgba(138, 43, 226, 0.1); backdrop-filter: blur(30px);
            animation: cardIn 0.5s cubic-bezier(0.23,1,0.32,1) both; position: relative;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.92) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header .header-icon { font-size: 2.5rem; color: #00d2ff; margin-bottom: 0.8rem; display: inline-block; }
        .login-header h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
        .login-header p { color: #94a3b8; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.45rem; color: #94a3b8; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .form-control {
            width: 100%; padding: 0.95rem 1.1rem; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;
            font-family: inherit; font-size: 0.95rem; transition: all 0.3s; box-sizing: border-box;
        }
        .form-control:focus { outline: none; border-color: #00d2ff; box-shadow: 0 0 20px rgba(0, 210, 255, 0.15); }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 3rem; }
        .toggle-password { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 1rem; transition: color 0.3s; padding: 0; }
        .toggle-password:hover { color: #00d2ff; }

        .forgot-link { text-align: right; margin-top: -0.3rem; margin-bottom: 1.2rem; }
        .forgot-link a { color: #475569; font-size: 0.8rem; cursor: pointer; transition: color 0.3s; text-decoration: none; }
        .forgot-link a:hover { color: #00d2ff; }

        .btn-submit {
            width: 100%; padding: 1rem; border: none; border-radius: 12px; font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: all 0.4s; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #00d2ff, #8a2be2); color: #fff;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(138, 43, 226, 0.35); }
        .btn-submit::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: 0.6s; }
        .btn-submit:hover::after { left: 100%; }

        .login-footer { margin-top: 1.8rem; text-align: center; color: #64748b; font-size: 0.9rem; }
        .login-footer a { color: #00d2ff; text-decoration: none; font-weight: 700; transition: color 0.3s; }
        .login-footer a:hover { color: #fff; }

        .form-validation { font-size: 0.75rem; margin-top: 0.3rem; display: none; align-items: center; gap: 0.3rem; }
        .form-validation.error { color: #fca5a5; display: flex; }
        .form-validation.success { color: #86efac; display: flex; }

        .alert { display: none; padding: 0.85rem; border-radius: 10px; margin-bottom: 1.2rem; font-size: 0.88rem; }
        .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

        .modal { position: fixed; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); }
        .modal.active { display: flex; }
        .modal-content { background: rgba(13, 17, 30, 0.95); border: 1px solid rgba(138, 43, 226, 0.2); border-radius: 20px; padding: 2rem; width: 90%; max-width: 400px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1.2rem; }
        .modal-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer; }
        .modal-close:hover { color: #fff; }
        .modal-description { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.2rem; }

        @media (max-width: 1023px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .hero-top { flex-direction: column; padding-top: 5.5rem; gap: 0.8rem; }
            .hero-top .right-text { text-align: left; }
        }
        @media (min-width: 768px) {
            .hero-subtitle { font-size: 0.85rem; }
            .hero-top p { font-size: 1rem; }
            .cta-btn { padding: 1rem 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <nav class="nav-container">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="logo-circle"><div class="logo-circle-inner"></div></div>
                <span class="logo-text">CloudCompare AI</span>
            </a>

        </div>
    </nav>

    <!-- Login form wrapper -->
    <div class="auth-container">
        <div class="login-card">

            <div class="login-header">
                <div class="header-icon"><i class="fas fa-cloud"></i></div>
                <h2>Welcome Back</h2>
                <p>Log in to access your dashboard</p>
            </div>
            <div id="errorMsg" class="alert alert-error">Invalid credentials</div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    <div class="form-validation" id="emailValidation"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="forgot-link">
                    <a onclick="openForgotPasswordModal()">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <div class="login-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reset Password</h3>
                <button class="modal-close" onclick="closeForgotPasswordModal()"><i class="fas fa-times"></i></button>
            </div>
            <p class="modal-description">Enter your email address and we'll send you a link to reset your password.</p>
            <div id="resetStatusMsg" class="alert"></div>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
                    <div class="form-validation" id="resetEmailValidation"></div>
                </div>
                <button type="submit" class="btn-submit" id="resetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
        document.getElementById('email').addEventListener('blur', () => { validateLoginEmail(); });
        function validateLoginEmail() {
            const el = document.getElementById('email'), v = document.getElementById('emailValidation'), email = el.value.trim();
            if (!email) { v.style.display = 'none'; return true; }
            if (!emailRegex.test(email)) { v.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format'; v.classList.remove('success'); v.classList.add('error'); return false; }
            v.innerHTML = '<i class="fas fa-check-circle"></i> Valid email'; v.classList.remove('error'); v.classList.add('success'); return true;
        }

        function openForgotPasswordModal() { document.getElementById('forgotPasswordModal').classList.add('active'); document.getElementById('resetStatusMsg').style.display='none'; document.getElementById('resetStatusMsg').className='alert'; document.getElementById('resetEmail').value=''; document.getElementById('resetEmailValidation').style.display='none'; }
        function closeForgotPasswordModal() { document.getElementById('forgotPasswordModal').classList.remove('active'); }
        document.getElementById('resetEmail').addEventListener('blur', () => { validateResetEmail(); });
        function validateResetEmail() {
            const el = document.getElementById('resetEmail'), v = document.getElementById('resetEmailValidation'), email = el.value.trim();
            if (!email) { v.style.display = 'none'; return true; }
            if (!emailRegex.test(email)) { v.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format'; v.classList.remove('success'); v.classList.add('error'); return false; }
            v.innerHTML = '<i class="fas fa-check-circle"></i> Valid email'; v.classList.remove('error'); v.classList.add('success'); return true;
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault(); if (!validateResetEmail()) return;
            const btn = document.getElementById('resetBtn'), statusMsg = document.getElementById('resetStatusMsg'), email = document.getElementById('resetEmail').value.trim();
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...'; btn.disabled = true; statusMsg.style.display = 'none';
            try {
                const response = await fetch('/api/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
                if (response.status === 404) { statusMsg.textContent = 'If an account exists with this email, you will receive a password reset link.'; statusMsg.classList.add('alert-success'); statusMsg.style.display = 'block'; setTimeout(() => closeForgotPasswordModal(), 3000); }
                else if (response.ok) { statusMsg.textContent = 'Password reset link sent!'; statusMsg.classList.add('alert-success'); statusMsg.style.display = 'block'; setTimeout(() => closeForgotPasswordModal(), 3000); }
                else { statusMsg.textContent = 'Failed to process request.'; statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block'; }
            } catch (err) { statusMsg.textContent = 'Network error. Please try again.'; statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block'; }
            finally { btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link'; btn.disabled = false; }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); if (!validateLoginEmail()) return;
            const btn = document.getElementById('loginBtn'), errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...'; btn.disabled = true; errorMsg.style.display = 'none';
            const email = document.getElementById('email').value.trim(), password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const text = await response.text(); let data; try { data = JSON.parse(text); } catch(e) { data = {}; }
                if (data.success && data.data && data.data.token) { 
                    localStorage.setItem('token', data.data.token); 
                    localStorage.setItem('userName', data.data.user.name); 
                    setTimeout(() => { window.location.href = 'dashboard.html?login=success'; }, 800); 
                } else { 
                    const errMsg = data.error || (data.detail && (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail))) || 'Invalid email or password';
                    errorMsg.textContent = errMsg; 
                    errorMsg.style.display = 'block'; 
                }
            } catch (err) { errorMsg.textContent = 'Unable to connect to the server.'; errorMsg.style.display = 'block'; }
            finally { btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; btn.disabled = false; }
        });
        document.getElementById('forgotPasswordModal').addEventListener('click', function(event) { if (event.target === this) closeForgotPasswordModal(); });
    </script>
</body>
</html>
