<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CloudCompare AI</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes unfold { from { opacity: 0; transform: perspective(1200px) rotateX(-25deg) translateY(50px) scale(0.8); } to { opacity: 1; transform: perspective(1200px) rotateX(0) translateY(0) scale(1); } }
        @keyframes drift { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-110px) rotate(360deg); } }
        @keyframes liquidBorder { 0%, 100% { border-color: rgba(212, 160, 23, 0.2); box-shadow: 0 0 20px rgba(212, 160, 23, 0.1); } 50% { border-color: rgba(251, 191, 36, 0.8); box-shadow: 0 0 40px rgba(212, 160, 23, 0.3); } }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateZ(30px) translateY(20px); } to { opacity: 1; transform: translateZ(30px) translateY(0); } }

        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
            perspective: 1500px;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 3rem 3.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            animation: unfold 1.2s cubic-bezier(0.23, 1, 0.32, 1) both, liquidBorder 4s infinite alternate;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(212, 160, 23, 0.03), transparent);
            animation: scanline 3s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .auth-header { text-align: center; margin-bottom: 2rem; transform: translateZ(50px); }
        .auth-header .logo-icon {
            font-size: 3rem;
            color: #d4a017;
            margin-bottom: 0.8rem;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(212, 160, 23, 0.6));
            animation: float 4s ease-in-out infinite;
        }
        .auth-header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
        .auth-header p { color: #94a3b8; font-size: 1rem; }

        .form-group { margin-bottom: 1.25rem; transform: translateZ(30px); opacity: 0; animation: slideIn 0.8s forwards; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 25px rgba(212, 160, 23, 0.2);
            transform: scale(1.02);
        }

        .btn-auth {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #d4a017, #fbbf24);
            color: #1a1408;
            border: none;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
            transform: translateZ(40px);
        }

        .btn-auth:hover { transform: translateZ(60px) translateY(-5px); box-shadow: 0 20px 40px rgba(212, 160, 23, 0.5); }
        .btn-auth::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.6s; }
        .btn-auth:hover::after { left: 100%; }

        .auth-footer { margin-top: 2rem; text-align: center; color: #64748b; transform: translateZ(20px); }
        .auth-footer a { color: #fbbf24; text-decoration: none; font-weight: 800; transition: 0.3s; }
        .auth-footer a:hover { color: white; text-shadow: 0 0 10px #fbbf24; }

        .form-validation { font-size: 0.75rem; margin-top: 0.4rem; display: none; align-items: center; gap: 0.3rem; transform: translateZ(25px); }
        .form-validation.error { color: #fca5a5; display: flex; }
        .form-validation.success { color: #86efac; display: flex; }

        .password-strength { margin-top: 0.8rem; transform: translateZ(25px); }
        .strength-indicator { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem; }
        .strength-bar { height: 100%; width: 0%; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .strength-bar.weak { background: #ef4444; width: 25%; }
        .strength-bar.fair { background: #fbbf24; width: 50%; }
        .strength-bar.good { background: #60a5fa; width: 75%; }
        .strength-bar.strong { background: #22c55e; width: 100%; }

        .password-requirements { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 1.2rem; margin-top: 1.2rem; transform: translateZ(20px); }
        .requirement { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; color: #475569; font-size: 0.75rem; transition: all 0.3s; }
        .requirement i { font-size: 0.6rem; }
        .requirement.met { color: #86efac; }
        .requirement.met i { color: #22c55e; }

        .alert { display: none; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.95rem; animation: slideIn 0.4s ease-out; }
        .alert-error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }

        /* Dynamic Particle System */
        .particle-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: #d4a017; border-radius: 50%; opacity: 0.4; animation: drift linear infinite; }
        
        .light-follow {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(212, 160, 23, 0.08), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: left 0.15s ease-out, top 0.15s ease-out;
        }
    </style>
</head>
<body>
    <div class="light-follow" id="lightFollow"></div>
    <div class="app-container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
                    <h2>Create Account</h2>
                    <p>Join CloudCompare AI today</p>
                </div>
                
                <div id="statusMsg" class="alert"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="emailValidation"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="password-strength">
                            <div class="strength-indicator">
                                <div class="strength-bar" id="strengthBar"></div>
                            </div>
                            <div class="strength-text" id="strengthText">
                                <i class="fas fa-circle"></i> <span id="strengthLabel">Enter a password</span>
                            </div>
                        </div>
                        <div class="password-requirements">
                            <div class="requirement" id="req-length">
                                <i class="fas fa-circle"></i> At least 8 characters
                            </div>
                            <div class="requirement" id="req-number">
                                <i class="fas fa-circle"></i> At least one number
                            </div>
                            <div class="requirement" id="req-symbol">
                                <i class="fas fa-circle"></i> At least one symbol (!@#$%^&*)
                            </div>
                            <div class="requirement" id="req-letter">
                                <i class="fas fa-circle"></i> At least one letter
                            </div>
                        </div>
                        <div class="form-validation" id="passwordValidation"></div>
                    </div>
                    <button type="submit" class="btn-auth" id="signupBtn">
                        <i class="fas fa-user-check"></i> Sign Up
                    </button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Email validation regex - requires proper format with 2+ character domain extension
        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
        // Password symbol regex
        const symbolRegex = /[!@#$%^&*(),.?":{}|<>]/;

        // Email field validation
        document.getElementById('email').addEventListener('blur', () => {
            validateSignupEmail();
        });

        function validateSignupEmail() {
            const emailInput = document.getElementById('email');
            const emailValidation = document.getElementById('emailValidation');
            const email = emailInput.value.trim();

            console.log('📧 Checking email:', email);

            if (!email) {
                emailValidation.style.display = 'none';
                console.log('⚠️ Email is empty');
                return true;
            }

            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success');
                emailValidation.classList.add('error');
                emailValidation.style.display = 'block';
                console.log('❌ Email format invalid');
                return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error');
                emailValidation.classList.add('success');
                emailValidation.style.display = 'block';
                console.log('✅ Email format valid');
                return true;
            }
        }

        // Password strength check
        document.getElementById('password').addEventListener('input', () => {
            checkPasswordStrength();
        });

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            const strengthLabel = document.getElementById('strengthLabel');
            const passwordValidation = document.getElementById('passwordValidation');

            // Check requirements
            const hasLength = password.length >= 8;
            const hasNumber = /\d/.test(password);
            const hasSymbol = symbolRegex.test(password);
            const hasLetter = /[a-zA-Z]/.test(password);

            console.log('🔐 Password requirements:', { 
                length: password.length, 
                hasLength, 
                hasNumber, 
                hasSymbol, 
                hasLetter 
            });

            // Update requirement indicators
            updateRequirement('req-length', hasLength);
            updateRequirement('req-number', hasNumber);
            updateRequirement('req-symbol', hasSymbol);
            updateRequirement('req-letter', hasLetter);

            // Calculate strength
            if (!password) {
                strengthBar.className = 'strength-bar';
                strengthText.className = 'strength-text';
                strengthLabel.textContent = 'Enter a password';
                passwordValidation.style.display = 'none';
                console.log('⚠️ Password is empty');
                return true;
            }

            let strength = 0;
            if (hasLength) strength++;
            if (hasNumber) strength++;
            if (hasSymbol) strength++;
            if (hasLetter) strength++;

            console.log('📊 Password strength level:', strength);

            // Update UI based on strength
            strengthBar.className = 'strength-bar';
            strengthText.className = 'strength-text';
            
            if (strength < 2) {
                strengthBar.classList.add('weak');
                strengthText.classList.add('weak');
                strengthLabel.textContent = 'Weak';
                passwordValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password is too weak';
                passwordValidation.classList.remove('success');
                passwordValidation.classList.add('error');
                passwordValidation.style.display = 'block';
                console.log('❌ Password strength: WEAK (cannot submit)');
                return false;
            } else if (strength < 3) {
                strengthBar.classList.add('fair');
                strengthText.classList.add('fair');
                strengthLabel.textContent = 'Fair';
                passwordValidation.innerHTML = '<i class="fas fa-info-circle"></i> Password is fair';
                passwordValidation.classList.remove('success');
                passwordValidation.classList.add('error');
                passwordValidation.style.display = 'block';
                console.log('❌ Password strength: FAIR (cannot submit)');
                return false;
            } else if (strength < 4) {
                strengthBar.classList.add('good');
                strengthText.classList.add('good');
                strengthLabel.textContent = 'Good';
                passwordValidation.innerHTML = '<i class="fas fa-check-circle"></i> Password is good';
                passwordValidation.classList.remove('error');
                passwordValidation.classList.add('success');
                passwordValidation.style.display = 'block';
                console.log('✅ Password strength: GOOD (can submit)');
                return true;
            } else {
                strengthBar.classList.add('strong');
                strengthText.classList.add('strong');
                strengthLabel.textContent = 'Strong';
                passwordValidation.innerHTML = '<i class="fas fa-check-circle"></i> Password is strong';
                passwordValidation.classList.remove('error');
                passwordValidation.classList.add('success');
                passwordValidation.style.display = 'block';
                console.log('✅ Password strength: STRONG (can submit)');
                return true;
            }
        }

        function updateRequirement(id, met) {
            const element = document.getElementById(id);
            if (met) {
                element.classList.add('met');
            } else {
                element.classList.remove('met');
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            console.log('📋 Signup form submitted');
            
            // Validate email
            console.log('🔍 Validating email...');
            const emailValid = validateSignupEmail();
            console.log('✉️ Email validation result:', emailValid);
            if (!emailValid) {
                console.log('❌ Email validation failed');
                statusMsg.textContent = 'Please enter a valid email address';
                statusMsg.classList.remove('alert-success');
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
                return;
            }

            // Validate password strength
            console.log('🔍 Validating password strength...');
            const passwordValid = checkPasswordStrength();
            console.log('🔐 Password validation result:', passwordValid);
            if (!passwordValid) {
                console.log('❌ Password validation failed');
                statusMsg.textContent = 'Password must be at least Good strength (3+ requirements)';
                statusMsg.classList.remove('alert-success');
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;
            statusMsg.style.display = 'none';
            statusMsg.className = 'alert';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            console.log('📝 Form data:', { name, email, password: '***' });

            // Final validation
            if (!name || name.length < 2) {
                console.log('❌ Name validation failed');
                statusMsg.textContent = 'Please enter a valid full name';
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-user-check"></i> Sign Up';
                btn.disabled = false;
                return;
            }

            try {
                console.log('🚀 Sending signup request to /api/auth/signup...');
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                console.log('📡 Response status:', response.status);
                const text = await response.text();
                console.log('📦 Response text:', text);

                let data;
                try { data = JSON.parse(text); } catch(e) { data = {}; }

                if (response.ok) {
                    createSuccessBurst();
                    console.log('✅ Signup successful');
                    statusMsg.textContent = 'Account created successfully! Redirecting...';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    triggerErrorShake();
                    console.log('❌ Signup failed:', data.error || text);
                    const errorMsg = data.error || data.message || `Signup failed (${response.status})`;
                    statusMsg.textContent = errorMsg;
                    statusMsg.classList.add('alert-error');
                    statusMsg.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-user-check"></i> Sign Up';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error('❌ Network error:', err);
                statusMsg.textContent = 'Unable to connect to the server. Please make sure the backend is running.';
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-user-check"></i> Sign Up';
                btn.disabled = false;
            }
        });

        // UI EXCELLENCE: Particle Background
        function initParticleSystem() {
            const bg = document.createElement('div');
            bg.className = 'particle-bg';
            document.body.appendChild(bg);
            
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 10}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.opacity = Math.random() * 0.5;
                bg.appendChild(p);
            }
        }
        initParticleSystem();

        // UI EXCELLENCE: Dynamic Light Follow
        const light = document.getElementById('lightFollow');
        document.addEventListener('mousemove', (e) => {
            light.style.left = `${e.clientX}px`;
            light.style.top = `${e.clientY}px`;
            
            // Perspective Tilt logic
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `perspective(1200px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // UI EXCELLENCE: Success Particle Burst
        function createSuccessBurst() {
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'success-particle';
                p.style.setProperty('--tx', `${(Math.random() - 0.5) * 600}px`);
                p.style.setProperty('--ty', `${(Math.random() - 0.5) * 600}px`);
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.background = Math.random() > 0.5 ? '#d4a017' : '#fbbf24';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // Trigger shake on error
        function triggerErrorShake() {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
        }
    </script>
</body>
</html>
