name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'openjdk'
    
    - name: Build with Maven
      run: |
        chmod +x ./mvnw
        ./mvnw clean install
    
    - name: Run tests
      run: ./mvnw test
    
    - name: Static code analysis
      run: ./mvnw sonar:sonar -Dsonar.projectKey=cloudcompare-ai -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      if: always()
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/index.html
      if: always()
    
    - name: Build Docker image
      run: |
        docker build -t cloudcompare-ai:${{ github.sha }} .
        docker tag cloudcompare-ai:${{ github.sha }} cloudcompare-ai:latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    - name: Push to Docker Hub
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker push cloudcompare-ai:${{ github.sha }}
        docker push cloudcompare-ai:latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
