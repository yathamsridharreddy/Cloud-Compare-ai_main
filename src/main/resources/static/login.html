<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudCompare AI</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes unfold { from { opacity: 0; transform: perspective(1000px) rotateX(-15deg) scale(0.9); } to { opacity: 1; transform: perspective(1000px) rotateX(0) scale(1); } }
        @keyframes borderGlow { 0%, 100% { border-color: rgba(212, 160, 23, 0.2); } 50% { border-color: #fbbf24; } }
        
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .auth-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 160, 23, 0.1);
            backdrop-filter: blur(20px);
            animation: unfold 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header .logo-icon {
            font-size: 3rem;
            color: #d4a017;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(212, 160, 23, 0.4));
        }
        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .auth-header p {
            color: #94a3b8;
            font-size: 1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.15);
            transform: translateY(-2px);
        }
        .btn-auth {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, #d4a017, #fbbf24);
            color: #1a1408;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .btn-auth:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(212, 160, 23, 0.4);
        }
        .btn-auth::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        .btn-auth:hover::after {
            left: 100%;
        }
        .auth-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #64748b;
        }
        .auth-footer a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }
        .auth-footer a:hover {
            color: white;
            text-shadow: 0 0 10px rgba(212, 160, 23, 0.5);
        }
        .alert {
            display: none;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        .particle-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: #d4a017; border-radius: 50%; opacity: 0.3; filter: blur(1px); animation: drift 20s linear infinite; }
        @keyframes drift { from { transform: translateY(100vh) rotate(0deg); } to { transform: translateY(-100px) rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-icon"><i class="fas fa-cloud"></i></div>
                    <h2>Welcome Back</h2>
                    <p>Log in to access your dashboard</p>
                </div>
                
                <div id="errorMsg" class="alert alert-error">Invalid credentials</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="emailValidation"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="forgot-password-link">
                        <a onclick="openForgotPasswordModal()">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-auth" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </div>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Reset Password</h3>
                    <button class="modal-close" onclick="closeForgotPasswordModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <p class="modal-description">Enter your email address and we'll send you a link to reset your password.</p>
                
                <div id="resetStatusMsg" class="alert"></div>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="resetEmail">Email Address</label>
                        <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="resetEmailValidation"></div>
                    </div>
                    <button type="submit" class="btn-auth" id="resetBtn">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Email validation regex - requires proper format with 2+ character domain extension
        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;

        // Email field validation
        document.getElementById('email').addEventListener('blur', () => {
            validateLoginEmail();
        });

        function validateLoginEmail() {
            const emailInput = document.getElementById('email');
            const emailValidation = document.getElementById('emailValidation');
            const email = emailInput.value.trim();

            if (!email) {
                emailValidation.style.display = 'none';
                return true;
            }

            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success');
                emailValidation.classList.add('error');
                return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error');
                emailValidation.classList.add('success');
                return true;
            }
        }

        // Forgot Password Modal Functions
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('active');
            document.getElementById('resetStatusMsg').style.display = 'none';
            document.getElementById('resetStatusMsg').className = 'alert';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetEmailValidation').style.display = 'none';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('active');
        }

        // Reset email validation
        document.getElementById('resetEmail').addEventListener('blur', () => {
            validateResetEmail();
        });

        function validateResetEmail() {
            const emailInput = document.getElementById('resetEmail');
            const emailValidation = document.getElementById('resetEmailValidation');
            const email = emailInput.value.trim();

            if (!email) {
                emailValidation.style.display = 'none';
                return true;
            }

            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success');
                emailValidation.classList.add('error');
                return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error');
                emailValidation.classList.add('success');
                return true;
            }
        }

        // Forgot Password Form Submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateResetEmail()) {
                return;
            }

            const btn = document.getElementById('resetBtn');
            const statusMsg = document.getElementById('resetStatusMsg');
            const email = document.getElementById('resetEmail').value.trim();

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;
            statusMsg.style.display = 'none';

            try {
                // In a real application, this would send to your backend
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.status === 404) {
                    // Email not found - but don't reveal this for security
                    statusMsg.textContent = 'If an account exists with this email, you will receive a password reset link.';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    setTimeout(() => closeForgotPasswordModal(), 3000);
                } else if (response.ok) {
                    statusMsg.textContent = 'Password reset link sent to your email!';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    setTimeout(() => closeForgotPasswordModal(), 3000);
                } else {
                    statusMsg.textContent = 'Failed to process request. Please try again.';
                    statusMsg.classList.add('alert-error');
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                statusMsg.textContent = 'Network error. Please try again later.';
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                btn.disabled = false;
            }
        });

        // Login Form Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateLoginEmail()) {
                return;
            }

            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { data = {}; }

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.name);
                    window.location.href = 'index.html?login=success';
                } else {
                    errorMsg.textContent = data.error || data.message || 'Invalid email or password';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Unable to connect to the server. Please make sure the backend is running.';
                errorMsg.style.display = 'block';
            } finally {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                btn.disabled = false;
            }
        });

        // Close modal on background click
        document.getElementById('forgotPasswordModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeForgotPasswordModal();
            }
        });

        // UI EXCELLENCE: Particle Background
        function initParticleSystem() {
            const bg = document.createElement('div');
            bg.className = 'particle-bg';
            document.body.appendChild(bg);
            
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 10}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.opacity = Math.random() * 0.5;
                bg.appendChild(p);
            }
        }
        initParticleSystem();
    </script>
</body>
</html>
