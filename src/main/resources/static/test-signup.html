<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Signup - CloudCompare AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1e293b; color: #e2e8f0; padding: 2rem; }
        .container { max-width: 400px; margin: 0 auto; background: #334155; padding: 2rem; border-radius: 10px; }
        h1 { color: #d4a017; margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #64748b; border-radius: 5px; font-size: 1rem; background: #1e293b; color: #e2e8f0; }
        button { width: 100%; padding: 0.75rem; background: #d4a017; color: #0f172a; border: none; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        button:hover { background: #f5d060; }
        .message { margin-top: 1rem; padding: 1rem; border-radius: 5px; text-align: center; font-weight: bold; display: none; }
        .success { background: rgba(34, 197, 94, 0.2); color: #86efac; display: block; }
        .error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Signup Form</h1>
        <form id="testForm">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Password123!" required>
            </div>
            <button type="submit">Signup</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            const btn = e.target.querySelector('button');
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            console.log('📋 Submitting:', { name, email, password });

            btn.disabled = true;
            btn.textContent = 'Signing Up...';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                console.log('Status:', response.status);
                const data = await response.json();
                console.log('Response:', data);

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ' + data.message;
                    document.getElementById('testForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + (data.error || 'Signup failed');
                }
            } catch (err) {
                console.error('Error:', err);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Network error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Signup';
            }
        });
    </script>
</body>
</html>
