# Server Configuration
server.port=5000

# Groq API Configuration
# NOTE: Set GROK_API_KEYS as an environment variable or update locally.
grok.api.keys=${GROK_API_KEYS:YOUR_GROQ_API_KEYS_HERE}
grok.endpoint=https://api.groq.com/openai/v1/chat/completions
grok.model=llama-3.1-8b-instant

# logging.level.org.springframework.security=TRACE
# logging.level.org.springframework.web=TRACE

# Request timeout (ms)
grok.timeout=20000

# Max retries
grok.max-retries=2

# Static resources
spring.web.resources.static-locations=classpath:/static/

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:cloudcompare}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 Console (Disabled for MySQL)
spring.h2.console.enabled=false

