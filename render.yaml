services:
  - type: web
    name: cloud-compare-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloud-compare-db
          property: connectionString
      - key: GROK_API_KEYS
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: cloud-compare-db
    databaseName: cloudcompare
    user: clouduser
