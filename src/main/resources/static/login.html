<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudCompare AI</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header .logo-icon {
            font-size: 2.5rem;
            color: #d4a017;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        .auth-header h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .auth-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #d4a017;
            box-shadow: 0 0 0 2px rgba(212, 160, 23, 0.2);
        }
        .btn-auth {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #d4a017, #b8860b);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(212, 160, 23, 0.5);
        }
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .auth-footer a {
            color: #d4a017;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .alert {
            display: none;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        .forgot-password-link {
            display: block;
            text-align: right;
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .forgot-password-link a {
            color: #d4a017;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .forgot-password-link a:hover {
            color: #f5d060;
            text-decoration: underline;
        }
        .form-validation {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
            align-items: center;
            gap: 0.3rem;
        }
        .form-validation.error {
            color: #fca5a5;
            display: flex;
        }
        .form-validation.success {
            color: #86efac;
            display: flex;
        }
        .form-validation i {
            font-size: 0.7rem;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.2s;
        }
        .modal-close:hover {
            color: #d4a017;
        }
        .modal-description {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-icon"><i class="fas fa-cloud"></i></div>
                    <h2>Welcome Back</h2>
                    <p>Log in to access your dashboard</p>
                </div>
                
                <div id="errorMsg" class="alert alert-error">Invalid credentials</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="emailValidation"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="forgot-password-link">
                        <a onclick="openForgotPasswordModal()">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-auth" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </div>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Reset Password</h3>
                    <button class="modal-close" onclick="closeForgotPasswordModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <p class="modal-description">Enter your email address and we'll send you a link to reset your password.</p>
                
                <div id="resetStatusMsg" class="alert"></div>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="resetEmail">Email Address</label>
                        <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="resetEmailValidation"></div>
                    </div>
                    <button type="submit" class="btn-auth" id="resetBtn">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Email validation regex - requires proper format with 2+ character domain extension
        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;

        // Email field validation
        document.getElementById('email').addEventListener('blur', () => {
            validateLoginEmail();
        });

        function validateLoginEmail() {
            const emailInput = document.getElementById('email');
            const emailValidation = document.getElementById('emailValidation');
            const email = emailInput.value.trim();

            if (!email) {
                emailValidation.style.display = 'none';
                return true;
            }

            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success');
                emailValidation.classList.add('error');
                return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error');
                emailValidation.classList.add('success');
                return true;
            }
        }

        // Forgot Password Modal Functions
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('active');
            document.getElementById('resetStatusMsg').style.display = 'none';
            document.getElementById('resetStatusMsg').className = 'alert';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetEmailValidation').style.display = 'none';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('active');
        }

        // Reset email validation
        document.getElementById('resetEmail').addEventListener('blur', () => {
            validateResetEmail();
        });

        function validateResetEmail() {
            const emailInput = document.getElementById('resetEmail');
            const emailValidation = document.getElementById('resetEmailValidation');
            const email = emailInput.value.trim();

            if (!email) {
                emailValidation.style.display = 'none';
                return true;
            }

            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success');
                emailValidation.classList.add('error');
                return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error');
                emailValidation.classList.add('success');
                return true;
            }
        }

        // Forgot Password Form Submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateResetEmail()) {
                return;
            }

            const btn = document.getElementById('resetBtn');
            const statusMsg = document.getElementById('resetStatusMsg');
            const email = document.getElementById('resetEmail').value.trim();

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;
            statusMsg.style.display = 'none';

            try {
                // In a real application, this would send to your backend
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.status === 404) {
                    // Email not found - but don't reveal this for security
                    statusMsg.textContent = 'If an account exists with this email, you will receive a password reset link.';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    setTimeout(() => closeForgotPasswordModal(), 3000);
                } else if (response.ok) {
                    statusMsg.textContent = 'Password reset link sent to your email!';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    setTimeout(() => closeForgotPasswordModal(), 3000);
                } else {
                    statusMsg.textContent = 'Failed to process request. Please try again.';
                    statusMsg.classList.add('alert-error');
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                statusMsg.textContent = 'Network error. Please try again later.';
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                btn.disabled = false;
            }
        });

        // Login Form Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateLoginEmail()) {
                return;
            }

            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { data = {}; }

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.name);
                    window.location.href = 'index.html?login=success';
                } else {
                    errorMsg.textContent = data.error || data.message || 'Invalid email or password';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Unable to connect to the server. Please make sure the backend is running.';
                errorMsg.style.display = 'block';
            } finally {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                btn.disabled = false;
            }
        });

        // Close modal on background click
        document.getElementById('forgotPasswordModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeForgotPasswordModal();
            }
        });
    </script>
</body>
</html>
