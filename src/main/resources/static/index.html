<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudCompare AI - Multi-Cloud Optimization</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .landing-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        
        .navbar {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.5rem;
            color: #d4a017;
        }
        
        .nav-auth {
            display: flex;
            gap: 1rem;
        }
        
        .btn-auth {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-signup {
            background: transparent;
            color: #d4a017;
            border: 1px solid rgba(212, 160, 23, 0.3);
        }
        
        .btn-signup:hover {
            background: rgba(212, 160, 23, 0.1);
            border-color: #d4a017;
        }
        
        .btn-login {
            background: #d4a017;
            color: black;
            border: none;
            box-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(212, 160, 23, 0.5);
        }
        
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 5;
        }
        
        .hero-content h1 {
            font-size: 5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #d4a017, #f5d060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero-content p {
            font-size: 1.25rem;
            color: #a89968;
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .element {
            position: absolute;
            background: rgba(212, 160, 23, 0.05);
            border: 1px solid rgba(212, 160, 23, 0.1);
            border-radius: 50%;
            filter: blur(40px);
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(100px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="floating-elements">
            <div class="element" style="width: 400px; height: 400px; top: -10%; left: -10%;"></div>
            <div class="element" style="width: 500px; height: 500px; bottom: -20%; right: -10%; animation-delay: -5s;"></div>
        </div>
        
        <nav class="navbar">
            <div class="nav-logo">
                <i class="fas fa-cloud"></i>
                <span>CloudCompare AI</span>
            </div>
            <div class="nav-auth">
                <a href="signup.html" class="btn-auth btn-signup">Sign Up</a>
                <a href="login.html" class="btn-auth btn-login">Login</a>
            </div>
        </nav>
        
        <main class="hero">
            <div class="hero-content">
                <h1>The Future of Cloud</h1>
                <p>Architecting high-performance multi-cloud infrastructure with AI-driven precision. Compare, optimize, and deploy with confidence.</p>
                <a href="login.html" class="btn-auth btn-login" style="padding: 1.2rem 3rem; font-size: 1.1rem;">Get Started Now</a>
            </div>
        </main>
    </div>
</body>
</html>
