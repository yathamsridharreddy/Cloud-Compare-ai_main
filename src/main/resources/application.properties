# Server Configuration
server.port=5000

# Groq API Configuration
# NOTE: Set GROK_API_KEYS as an environment variable or update locally.
grok.api.keys=${GROK_API_KEYS:YOUR_GROQ_API_KEYS_HERE}
grok.endpoint=https://api.groq.com/openai/v1/chat/completions
grok.model=llama-3.1-8b-instant

# logging.level.org.springframework.security=TRACE
# logging.level.org.springframework.web=TRACE

# Request timeout (ms)
grok.timeout=20000

# Max retries
grok.max-retries=2

# Static resources
spring.web.resources.static-locations=classpath:/static/

# H2 In-Memory Database (local development)
spring.datasource.url=jdbc:h2:mem:cloudcompare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

