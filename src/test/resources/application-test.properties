spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

jwt.secret=dummy_secret_key_for_tests_must_be_long_enough_and_strong
jwt.expiration=86400000

grok.api.keys=dummy_key
grok.endpoint=http://localhost:8080/dummy
grok.model=llama-3.1-8b-instant
grok.timeout=1000
grok.max-retries=1

# Silence logs to see errors clearly
logging.level.root=INFO
logging.level.com.cloudcompare.ai=DEBUG
logging.level.org.springframework.web=DEBUG
